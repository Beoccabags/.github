name: Bug report
description: Iets werkt niet zoals verwacht
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Bedankt voor het melden. Hoe nauwkeuriger je dit invult, hoe sneller het opgelost is.

  - type: textarea
    id: what-happened
    attributes:
      label: Wat ging er mis?
      description: Beschrijf het probleem in een paar zinnen.
      placeholder: "Bij het toevoegen van een product aan de cart krijg ik een 500 error."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Wat had je verwacht?
      placeholder: "Het product wordt toegevoegd en ik zie de cart drawer."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproductiestappen
      description: Stap voor stap, zodat iemand anders het kan nadoen.
      value: |
        1. Ga naar '...'
        2. Klik op '...'
        3. Zie fout
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL
      description: Pagina waar het gebeurde (mag een staging-URL zijn).
      placeholder: "https://beocca.com/products/..."

  - type: dropdown
    id: environment
    attributes:
      label: Omgeving
      options:
        - Productie
        - Staging
        - Lokaal
        - Onbekend
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Apparaat / browser
      multiple: true
      options:
        - Desktop — Chrome
        - Desktop — Safari
        - Desktop — Firefox
        - iOS — Safari
        - iOS — Chrome
        - Android — Chrome
        - Android — Samsung Internet
        - Anders / niet relevant

  - type: textarea
    id: logs
    attributes:
      label: Console / netwerk-logs
      description: Plak relevante errors. Wordt automatisch als code geformatteerd.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / opnames
      description: Sleep ze hierin.

  - type: textarea
    id: extra
    attributes:
      label: Overige context
      description: Alles wat verder relevant kan zijn — recente wijzigingen, frequentie, klantmeldingen, etc.
